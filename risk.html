<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Analysis</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --safe: #059669;
      --borderline: #d97706;
      --at-risk: #dc2626;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.25rem;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.85rem;
    }

    .safe { background: #ecfdf5; color: var(--safe); }
    .borderline { background: #fffbeb; color: var(--borderline); }
    .at-risk { background: #fee2e2; color: var(--at-risk); }

    ul { list-style: none; margin: 0; padding: 0; }

    li {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.85rem;
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }

    .name { font-weight: 600; }
    .avg { color: var(--muted); }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Performance Group</h1>
    <div id="meta" class="meta"></div>
    <span id="badge" class="pill">Safe</span>
    <ul id="list"></ul>
    <div id="empty" class="empty" style="display:none;">No students in this category.</div>
  </div>

  <script>
    const STORAGE_KEY = 'studentAppData';

    function normalizeLabel(value) {
      return String(value || '').trim();
    }

    function toRawData(data) {
      if (!data || typeof data !== 'object') {
        return { students: [], subjects: [], exams: [] };
      }

      const subjects = (data.subjects || []).map(s => normalizeLabel(s?.name || s)).filter(Boolean);
      const exams = (data.exams || []).map(e => normalizeLabel(e?.title || e?.name || e)).filter(Boolean);

      const subjectIdToName = new Map((data.subjects || []).map(s => [s?.id, normalizeLabel(s?.name)]));
      const examIdToName = new Map((data.exams || []).map(e => [e?.id, normalizeLabel(e?.title || e?.name)]));

      const students = (data.students || []).map(student => {
        const raw = {
          name: normalizeLabel(student?.name),
          scores: {}
        };

        const scoreMap = student?.scores || {};
        Object.entries(scoreMap).forEach(([subjectKey, examMap]) => {
          const subjectName = normalizeLabel(subjectIdToName.get(subjectKey) || subjectKey);
          if (!subjectName || !examMap || typeof examMap !== 'object') return;
          raw.scores[subjectName] = raw.scores[subjectName] || {};

          Object.entries(examMap).forEach(([examKey, value]) => {
            const examName = normalizeLabel(examIdToName.get(examKey) || examKey);
            if (!examName) return;
            const num = Number(value);
            raw.scores[subjectName][examName] = isNaN(num) ? 0 : Math.max(0, Math.min(100, num));
          });
        });

        return raw;
      });

      return { students, subjects, exams };
    }

    function getLatestExam(data) {
      return data.exams[data.exams.length - 1];
    }

    function getAverage(data, student, exam) {
      let total = 0;
      let count = 0;

      data.subjects.forEach(subject => {
        const value = student.scores?.[subject]?.[exam];
        if (value !== undefined && value !== null && value !== '' && !isNaN(value)) {
          total += Number(value);
          count++;
        }
      });

      return count ? total / count : 0;
    }

    function getRiskLevel(avg) {
      if (avg >= 70) return 'safe';
      if (avg >= 50) return 'borderline';
      return 'at-risk';
    }

    function groupStudentsByRisk(data) {
      const latestExam = getLatestExam(data);
      const groups = { safe: [], borderline: [], 'at-risk': [] };

      (data.students || []).forEach(student => {
        const avg = latestExam ? getAverage(data, student, latestExam) : 0;
        const risk = getRiskLevel(avg);
        groups[risk].push({ name: student.name || 'Unnamed', avg: avg.toFixed(1) });
      });

      return { groups, latestExam: latestExam || 'N/A' };
    }

    function getTypeLabel(type) {
      if (type === 'at-risk') return 'At Risk';
      if (type === 'borderline') return 'Borderline';
      return 'Safe';
    }

    function render() {
      const query = new URLSearchParams(window.location.search);
      const type = ['safe', 'borderline', 'at-risk'].includes(query.get('type')) ? query.get('type') : 'safe';

      const saved = localStorage.getItem(STORAGE_KEY);
      const rawData = toRawData(saved ? JSON.parse(saved) : null);
      const { groups, latestExam } = groupStudentsByRisk(rawData);
      const items = groups[type] || [];

      const title = document.getElementById('title');
      const meta = document.getElementById('meta');
      const badge = document.getElementById('badge');
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');

      title.textContent = `${getTypeLabel(type)} Students`;
      meta.textContent = `Latest Exam: ${latestExam} · Count: ${items.length}`;
      badge.textContent = getTypeLabel(type);
      badge.className = `pill ${type}`;

      if (!items.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = items.map(item => `
        <li>
          <span class="name">${item.name}</span>
          <span class="avg">Avg: ${item.avg}%</span>
        </li>
      `).join('');
    }

    render();
  </script>
</body>
</html>
