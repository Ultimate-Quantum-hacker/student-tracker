<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Performance Tracker</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .card {
      width: min(100%, 36rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Performance Analysis moved</h1>
    <p id="message">Opening Performance Analysis in Student Performance Tracker…</p>
    <a id="continue-link" href="index.html?section=performance-analysis">Open Student Performance Tracker</a>
  </main>

  <script>
    const query = new URLSearchParams(window.location.search);
    const requestedType = String(query.get('type') || '').trim().toLowerCase();
    const destinationParams = new URLSearchParams({ section: 'performance-analysis' });

    if (requestedType === 'borderline' || requestedType === 'at-risk') {
      destinationParams.set('category', requestedType);
    }

    const message = document.getElementById('message');
    const continueLink = document.getElementById('continue-link');
    const destination = `index.html?${destinationParams.toString()}`;

    if (requestedType === 'safe') {
      message.textContent = 'Safe students now appear across the Strong, Good, and Average categories in Student Performance Tracker. Opening Performance Analysis…';
    } else if (requestedType === 'borderline') {
      message.textContent = 'Opening the Borderline category in Student Performance Tracker…';
    } else if (requestedType === 'at-risk') {
      message.textContent = 'Opening the At Risk category in Student Performance Tracker…';
    }

    continueLink.href = destination;
    window.setTimeout(() => {
      window.location.replace(destination);
    }, 120);
  </script>
</body>
</html>
