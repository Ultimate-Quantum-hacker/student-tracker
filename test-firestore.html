<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
        .loading { color: blue; }
        button { padding: 8px 16px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Firebase Integration Test</h1>
    
    <div class="test-section">
        <h2>1. Firebase Connection Test</h2>
        <button onclick="testFirebaseConnection()">Test Connection</button>
        <div id="connection-result"></div>
    </div>

    <div class="test-section">
        <h2>2. Database Operations Test</h2>
        <button onclick="testDatabaseOperations()">Test CRUD Operations</button>
        <div id="db-result"></div>
    </div>

    <div class="test-section">
        <h2>3. Full App Integration Test</h2>
        <button onclick="testAppIntegration()">Test App Integration</button>
        <div id="app-result"></div>
    </div>

    <div class="test-section">
        <h2>4. Data View</h2>
        <button onclick="viewCurrentData()">View Current Data</button>
        <pre id="data-view"></pre>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>

    <script type="module">
        import { db, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from './js/firebase.js';

        window.testFirebaseConnection = async function() {
            const result = document.getElementById('connection-result');
            result.innerHTML = '<div class="loading">Testing Firebase connection...</div>';
            
            try {
                // Test basic connection
                const testCollection = collection(db, 'test');
                const testDoc = await addDoc(testCollection, { test: 'connection', timestamp: new Date() });
                
                // Clean up test document
                await deleteDoc(doc(db, 'test', testDoc.id));
                
                result.innerHTML = '<div class="success">✅ Firebase connection successful!</div>';
                console.log('Firebase connection test passed');
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Firebase connection failed: ${error.message}</div>`;
                console.error('Firebase connection test failed:', error);
            }
        };

        window.testDatabaseOperations = async function() {
            const result = document.getElementById('db-result');
            result.innerHTML = '<div class="loading">Testing database operations...</div>';
            
            try {
                // Test Create
                const testStudent = await addDoc(collection(db, 'students'), {
                    name: 'Test Student',
                    class: 'Test Class',
                    createdAt: new Date().toISOString()
                });
                
                // Test Read
                const studentsSnapshot = await getDocs(collection(db, 'students'));
                const studentsCount = studentsSnapshot.docs.length;
                
                // Test Update
                await updateDoc(doc(db, 'students', testStudent.id), {
                    name: 'Updated Test Student'
                });
                
                // Test Delete
                await deleteDoc(doc(db, 'students', testStudent.id));
                
                result.innerHTML = `
                    <div class="success">✅ Database operations successful!</div>
                    <div>Current students count: ${studentsCount}</div>
                `;
                console.log('Database operations test passed');
            } catch (error) {
                result.innerHTML = `<div class="error">❌ Database operations failed: ${error.message}</div>`;
                console.error('Database operations test failed:', error);
            }
        };

        window.testAppIntegration = async function() {
            const result = document.getElementById('app-result');
            result.innerHTML = '<div class="loading">Testing app integration...</div>';
            
            try {
                // Load the app's state module
                const { default: app } = await import('./js/state.js');
                
                // Test app loading
                await app.load();
                
                const studentsCount = app.state.students.length;
                const examsCount = app.state.exams.length;
                const subjectsCount = app.state.subjects.length;
                
                result.innerHTML = `
                    <div class="success">✅ App integration successful!</div>
                    <div>Students: ${studentsCount}</div>
                    <div>Exams: ${examsCount}</div>
                    <div>Subjects: ${subjectsCount}</div>
                `;
                console.log('App integration test passed');
            } catch (error) {
                result.innerHTML = `<div class="error">❌ App integration failed: ${error.message}</div>`;
                console.error('App integration test failed:', error);
            }
        };

        window.viewCurrentData = async function() {
            const dataView = document.getElementById('data-view');
            dataView.textContent = 'Loading data...';
            
            try {
                const studentsSnapshot = await getDocs(collection(db, 'students'));
                const examsSnapshot = await getDocs(collection(db, 'exams'));
                const subjectsSnapshot = await getDocs(collection(db, 'subjects'));
                const scoresSnapshot = await getDocs(collection(db, 'scores'));
                
                const data = {
                    students: studentsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })),
                    exams: examsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })),
                    subjects: subjectsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })),
                    scores: scoresSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                };
                
                dataView.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                dataView.textContent = `Error loading data: ${error.message}`;
            }
        };

        // Auto-run connection test on page load
        window.addEventListener('load', () => {
            console.log('Firebase test page loaded');
        });
    </script>
</body>
</html>
