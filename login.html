<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Performance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page" data-auth-mode="login">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="login-title">
      <div class="auth-card-header">
        <span class="auth-badge">Secure access</span>
        <div class="auth-brand-lockup">
          <div class="auth-logo" aria-hidden="true">ST</div>
          <div class="auth-heading-group">
            <h1 id="login-title" class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to continue to Student Performance Tracker.</p>
          </div>
        </div>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" inputmode="email" spellcheck="false" autocapitalize="none" placeholder="you@example.com" required autofocus>
        </div>

        <div class="auth-field">
          <label for="login-password">Password</label>
          <div class="auth-password-field">
            <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required minlength="6">
            <button id="togglePassword" class="auth-password-toggle" type="button" aria-controls="login-password" aria-label="Show password" aria-pressed="false">
              <span class="auth-password-toggle-icon" aria-hidden="true">👁</span>
              <span class="auth-password-toggle-text">Show</span>
            </button>
          </div>
        </div>

        <p id="auth-error" class="auth-error" aria-live="polite"></p>

        <button id="auth-submit" class="auth-btn" type="submit">Login</button>

        <div class="auth-row">
          <button id="forgot-password-btn" class="auth-link auth-link-button" type="button">Forgot password?</button>
          <a class="auth-link" href="signup.html">Create account</a>
        </div>
      </form>

      <p class="auth-footnote">Your session remains active after refresh.</p>
    </section>
  </main>

  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth-page.js"></script>
</body>
</html>
