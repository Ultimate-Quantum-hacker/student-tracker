<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Performance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page" data-auth-mode="login">
  <main class="auth-shell">
    <section class="auth-card" aria-labelledby="login-title">
      <h1 id="login-title" class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue to Student Performance Tracker.</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="auth-field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required minlength="6">
        </div>

        <p id="auth-error" class="auth-error" aria-live="polite"></p>

        <button id="auth-submit" class="auth-btn" type="submit">Login</button>

        <div class="auth-row">
          <span></span>
          <a class="auth-link" href="signup.html">Create account</a>
        </div>
      </form>

      <p class="auth-footnote">Your session remains active after refresh.</p>
    </section>
  </main>

  <script src="js/firebase-config.js"></script>
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth-page.js"></script>
</body>
</html>
